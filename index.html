<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Please find your seat</title>
    <style>
        /* 导入楷体及基础样式 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            /* 肌理感背景：奶油底色搭配微弱颗粒感 */
            background-color: #fcf8f2;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)' opacity='0.05'/%3E%3C/svg%3E");
            color: #000000;
            font-family: "STKaiti", "楷体", "Kaiti SC", "Kaiti", serif;
            line-height: 1.6;
            padding: 20px;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
            text-align: center;
        }

        /* 蝴蝶结装饰图 */
        .bow-icon {
            width: 80px;
            margin: 0 auto 10px;
            display: block;
        }

        .header {
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 32px;
            font-weight: normal;
            margin-bottom: 5px;
        }

        .header p {
            font-size: 16px;
            opacity: 0.8;
        }

        /* 搜索框样式 */
        .search-box {
            margin-bottom: 30px;
            position: relative;
        }

        .search-input {
            width: 100%;
            padding: 12px 40px 12px 15px;
            border: 1px solid #000;
            background: transparent;
            font-family: inherit;
            font-size: 16px;
            outline: none;
            text-align: center;
        }

        .search-icon {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            width: 18px;
            height: 18px;
        }

        /* 结果卡片 */
        .result-card {
            border: 1px solid #000;
            padding: 25px;
            margin-bottom: 30px;
            display: none;
            background: rgba(255, 255, 255, 0.3);
        }

        .result-card.show {
            display: block;
        }

        .table-title {
            font-size: 24px;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .guest-list {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 10px;
            list-style: none;
        }

        .guest-tag {
            padding: 5px 12px;
            border: 1px dashed #000;
            font-size: 16px;
        }

        .guest-tag.highlight {
            background: #000;
            color: #fff;
            border-style: solid;
        }

        /* 座位图分布 */
        .section-title {
            font-size: 22px;
            margin: 40px 0 20px;
            border-bottom: 1px solid #000;
            display: inline-block;
            padding: 0 20px 5px;
        }

        .tables-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            /* 调整为2列以适应长厅名 */
            gap: 15px;
            margin-bottom: 40px;
        }

        .table-item {
            border: 1px solid #000;
            padding: 10px 5px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .table-item.active {
            background: #000;
            color: #fff;
        }

        .table-item h4 {
            font-size: 14px;
            font-weight: normal;
        }

        /* 时间线样式 */
        .timeline {
            margin: 40px 0;
        }

        .timeline-item {
            margin-bottom: 25px;
            position: relative;
        }

        .timeline-time {
            font-size: 18px;
            font-weight: bold;
            display: block;
            margin-bottom: 5px;
        }

        .timeline-content h4 {
            font-size: 18px;
            font-weight: normal;
        }

        .timeline-content p {
            font-size: 14px;
            opacity: 0.8;
        }

        .footer {
            margin-top: 50px;
            padding-bottom: 30px;
            border-top: 1px solid #000;
            padding-top: 20px;
            font-size: 14px;
        }
    </style>
</head>

<body>

    <div class="container">
        <svg class="bow-icon" viewBox="0 0 100 60" xmlns="http://www.w3.org/2000/svg">
            <path d="M50 30c-10-20-40-20-40 0 0 15 20 20 40 5 20 15 40 10 40-5 0-20-30-20-40 0z" fill="none"
                stroke="#000" stroke-width="1.5" />
            <circle cx="50" cy="30" r="4" fill="#000" />
            <path d="M48 34l-8 20M52 34l8 20" stroke="#000" stroke-width="1.5" />
        </svg>

        <div class="header">
            <h1>Please find your seat</h1>
            <p>输入姓名、拼音或首字母查询座位</p>
        </div>

        <div class="search-box">
            <input type="text" class="search-input" id="searchInput" placeholder="Search your name..."
                autocomplete="off">
            <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="#000" stroke-width="2">
                <circle cx="11" cy="11" r="8" />
                <line x1="21" y1="21" x2="16.65" y2="16.65" />
            </svg>
        </div>

        <div class="result-card" id="resultCard">
            <div class="table-title" id="resTable"></div>
            <ul class="guest-list" id="resGuests"></ul>
        </div>

        <h3 class="section-title">Table Setting</h3>
        <div class="tables-grid" id="tablesGrid"></div>

        <h3 class="section-title">Wedding Timeline</h3>
        <div class="timeline">
            <div class="timeline-item">
                <span class="timeline-time">10:00</span>
                <div class="timeline-content">
                    <h4>室内合照环节</h4>
                    <p>与新人合影留念，记录美好时刻</p>
                </div>
            </div>
            <div class="timeline-item">
                <span class="timeline-time">11:38</span>
                <div class="timeline-content">
                    <h4>仪式环节</h4>
                    <p>婚礼正式仪式，见证幸福时刻</p>
                </div>
            </div>
            <div class="timeline-item">
                <span class="timeline-time">14:00</span>
                <div class="timeline-content">
                    <h4>餐厅娱乐</h4>
                    <p>请至茶楼，安排有麻将娱乐</p>
                </div>
            </div>
        </div>

        <div class="footer">
            祝您有一个美好的婚礼体验<br>
            百年好合 · 永结同心
        </div>
    </div>

    <script>
        const pinyinDict = { '黄': 'huang', '露': 'lu', '刘': 'liu', '亦': 'yi', '乐': 'le', '胡': 'hu', '家': 'jia', '铭': 'ming', '林': 'lin', '玥': 'yue', '昊': 'hao', '高': 'gao', '鑫': 'xin', '罗': 'luo', '翔': 'xiang', '赵': 'zhao', '欣': 'xin', '新': 'xin', '张': 'zhang', '环': 'huan', '宇': 'yu', '杰': 'jie', '陈': 'chen', '卓': 'zhuo', '飞': 'fei', '嘉': 'jia', '瑾': 'jin', '潘': 'pan', '俊': 'jun', '伯': 'bo', '田': 'tian', '植': 'zhi', '李': 'li', '洪': 'hong', '全': 'quan', '宁': 'ning', '傲': 'ao', '侠': 'xia', '博': 'bo', '文': 'wen', '云': 'yun', '桥': 'qiao', '侨': 'qiao', '覃': 'qin', '逸': 'yi', '知': 'zhi', '非': 'fei', '志': 'zhi', '浩': 'hao', '华': 'hua', '健': 'jian', '昂': 'ang', '卢': 'lu', '蕴': 'yun', '川': 'chuan', '雅': 'ya', '雯': 'wen', '卿': 'qing', '扬': 'yang', '帆': 'fan', '思': 'si', '成': 'cheng', '迪': 'di', '雨': 'yu', '峰': 'feng', '徐': 'xu', '卿': 'qing', '皓': 'hao', '然': 'ran', '奕': 'yi', '锋': 'feng', '祥': 'xiang', '舒': 'shu', '何': 'he', '剑': 'jian', '恒': 'heng', '嘉': 'jia', '尧': 'yao', '马': 'ma', '雪': 'xue', '玖': 'jiu', '萝': 'luo', '冯': 'feng', '潇': 'xiao', '存': 'cun', '雷': 'lei', '宋': 'song', '代': 'dai', '伟': 'wei', '馨': 'xin', '雨': 'yu', '蒙': 'meng', '迪': 'di', '真': 'zhen', '如': 'ru', '帮': 'bang', '羽': 'yu', '雅': 'ya', '静': 'jing', '曾': 'zeng', '琳': 'lin', '婷': 'ting', '志': 'zhi', '琦': 'qi', '贾': 'jia', '茹': 'ru', '鹏': 'peng', '郎': 'lang', '娘': 'niang', '父': 'fu', '母': 'mu', '继': 'ji', '红': 'hong', '谢': 'xie', '四': 'si', '季': 'ji', '房': 'fang', '春': 'chun', '平': 'ping', '彬': 'bin', '涂': 'tu', '黎': 'li', '坤': 'kun', '苏': 'su', '泽': 'ze', '源': 'yuan', '奇': 'qi', '韩': 'han', '卫': 'wei', '红': 'hong', '廖': 'liao', '玉': 'yu', '琼': 'qiong', '琴': 'qin', '樊': 'fan', '卫': 'wei', '楠': 'nan', '彬': 'bin', '毛': 'mao', '莉': 'li', '媛': 'yuan', '欧': 'ou', '丽': 'li', '兴': 'xing', '康': 'kang', '峻': 'jun', '娟': 'juan', '许': 'xu', '文': 'wen', '婷': 'ting', '蒋': 'jiang', '平': 'ping', '衡': 'heng', '玲': 'ling', '芳': 'fang', '烈': 'lie', '晓': 'xiao', '涛': 'tao', '吴': 'wu', '春': 'chun', '华': 'hua', '蓉': 'rong', '林': 'lin', '伍': 'wu', '静': 'jing', '红': 'hong', '莉': 'li', '升': 'sheng', '兰': 'lan', '肖': 'xiao', '尧': 'yao', '启': 'qi', '祥': 'xiang', '军': 'jun', '辉': 'hui', '阳': 'yang', '厚': 'hou', '义': 'yi', '谭': 'tan', '周': 'zhou', '友': 'you', '学': 'xue', '静': 'jing', '定': 'ding', '琴': 'qin', '西': 'xi', '东': 'dong', '万': 'wan', '家': 'jia', '丽': 'li', '欣': 'xin', '袁': 'yuan', '姐': 'jie', '克': 'ke', '勤': 'qin', '剑': 'jian', '文': 'wen', '明': 'ming', '兵': 'bing', '英': 'ying', '绮': 'qi', '祥': 'xiang', '瑜': 'yu', '渊': 'yuan', '玫': 'mei', '芗': 'xiang', '佳': 'jia' };

        const seatingData = [
            { table: "悦庭厅1", guests: ["新郎", "新娘", "新郎父母", "新娘父亲", "新娘母亲", "黄渊", "吴西东", "吴英绮", "杨祥祥"] },
            { table: "悦庭厅2", guests: ["杨雅静", "曾琳", "曾婷", "王志琦", "贾茹", "张鹏", "高鑫", "高瑜", "黄露"] },
            { table: "悦庭厅3", guests: ["刘亦乐", "胡家铭", "林玥昊", "罗宇翔", "赵欣新"] },
            { table: "悦庭厅5", guests: ["张环宇", "刘杰", "陈卓飞", "张嘉瑾", "潘俊伯"] },
            { table: "悦庭厅6", guests: ["李昂", "田植", "李雨峰", "李博文", "罗云侨", "覃逸飞"] },
            { table: "悦庭厅7", guests: ["陈知非", "刘志浩", "李华健", "陈雅雯", "卢蕴川"] },
            { table: "悦庭厅8", guests: ["卿扬帆", "李思成", "张迪", "李洪全", "徐卿", "张皓然", "李奕锋"] },
            { table: "悦庭厅9", guests: ["赵祥舒", "何剑宇", "陈尧", "马雪文", "成玫芗", "冯潇扬"] },
            { table: "悦庭厅10", guests: ["刘存雷", "张俊", "宋代伟", "黄馨雨", "何蒙迪", "李真如", "覃帮羽"] },
            { table: "锦程厅1", guests: ["杨继红", "谢四季", "房春平", "陈彬"] },
            { table: "锦程厅2", guests: ["涂红黎", "李坤", "苏泽源", "韩卫红", "廖玉琼"] },
            { table: "锦程厅3", guests: ["冯琴", "樊卫华", "黄楠彬", "毛莉", "宋媛媛"] },
            { table: "锦程厅5", guests: ["欧春丽", "樊兴", "苏娟", "许文婷"] },
            { table: "锦程厅6", guests: ["康峻", "蒋平", "衡玲芳", "文烈", "衡莉"] },
            { table: "锦程厅7", guests: ["张晓涛", "吴春华", "曾小蓉", "曾小林", "伍静", "伍红"] },
            { table: "锦程厅8", guests: ["王升兰", "张定琴", "张定万", "张家丽"] },
            { table: "锦程厅9", guests: ["张家欣", "袁姐（卢佳）", "刘克勤", "刘克剑", "刘万明"] },
            { table: "锦程厅10", guests: ["肖尧", "肖启祥", "肖军", "肖辉", "阳厚义", "谭周友", "肖学静"] }
        ];

        function getPinyinData(name) {
            let full = '', init = '';
            for (let char of name) {
                let p = pinyinDict[char] || char.toLowerCase();
                full += p; init += p[0];
            }
            return { full, init };
        }

        const processedData = seatingData.map(t => ({
            ...t,
            guestObjects: t.guests.map(name => ({ name, ...getPinyinData(name) }))
        }));

        const searchInput = document.getElementById('searchInput');
        const resultCard = document.getElementById('resultCard');
        const tablesGrid = document.getElementById('tablesGrid');

        processedData.forEach(t => {
            const div = document.createElement('div');
            div.className = 'table-item';
            div.dataset.id = t.table;
            div.innerHTML = `<h4>${t.table}</h4>`;
            div.onclick = () => renderResult(t, '');
            tablesGrid.appendChild(div);
        });

        function renderResult(data, highlight) {
            resultCard.classList.add('show');
            document.getElementById('resTable').innerHTML = `<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#000" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg> ${data.table}`;

            const listHtml = data.guestObjects.map(g => {
                const isMatch = highlight && (
                    g.name.includes(highlight) ||
                    g.full.includes(highlight) ||
                    g.init.includes(highlight)
                );
                return `<li class="guest-tag ${isMatch ? 'highlight' : ''}">${g.name}</li>`;
            }).join('');

            document.getElementById('resGuests').innerHTML = listHtml;
            document.querySelectorAll('.table-item').forEach(el => el.classList.toggle('active', el.dataset.id === data.table));
        }

        searchInput.addEventListener('input', (e) => {
            const val = e.target.value.trim().toLowerCase();
            if (!val) {
                resultCard.classList.remove('show');
                document.querySelectorAll('.table-item').forEach(el => el.classList.remove('active'));
                return;
            }
            const found = processedData.find(t => t.guestObjects.some(g => g.name.includes(val) || g.full.includes(val) || g.init.includes(val)));
            if (found) renderResult(found, val);
        });
    </script>
</body>

</html>
